<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Deep Thesis{% endblock %}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #FAFAF8; font-family: Arial, Helvetica, sans-serif; color: #1A1A1A; -webkit-text-size-adjust: 100%;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #FAFAF8;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%; background-color: #FFFFFF; border: 1px solid #E8E6E3; border-radius: 4px;">

          <!-- Header -->
          <tr>
            <td style="padding: 32px 40px 24px 40px; border-bottom: 2px solid #F28C28;">
              <table role="presentation" cellpadding="0" cellspacing="0"><tr>
                <td style="vertical-align: middle; padding-right: 8px;">
                  <span style="display: inline-block; width: 28px; height: 28px; line-height: 28px; text-align: center; border: 2px solid #F28C28; border-radius: 50%; font-family: Georgia, 'Times New Roman', serif; font-size: 16px; font-weight: bold; color: #F28C28;">D</span>
                </td>
                <td style="vertical-align: middle;">
                  <span style="font-family: Georgia, 'Times New Roman', serif; font-size: 24px; color: #1A1A1A; font-weight: normal; letter-spacing: -0.5px;">Deep Thesis</span>
                </td>
              </tr></table>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding: 40px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 24px 40px; border-top: 1px solid #E8E6E3; text-align: center;">
              <p style="margin: 0; font-size: 12px; color: #9B9B9B; line-height: 1.6;">
                &copy; 2026 Deep Thesis &middot; <a href="https://www.deepthesis.co" style="color: #9B9B9B; text-decoration: underline;">deepthesis.co</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
