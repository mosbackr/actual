services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: acutal
      POSTGRES_PASSWORD: acutal
      POSTGRES_DB: acutal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acutal"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ACUTAL_DATABASE_URL: postgresql+asyncpg://acutal:acutal@db:5432/acutal
      ACUTAL_JWT_SECRET: dev-secret-change-in-production
      ACUTAL_LOGO_DEV_TOKEN: ${LOGO_DEV_TOKEN:-}
      ACUTAL_PERPLEXITY_API_KEY: ${ACUTAL_PERPLEXITY_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://${HOST_IP:-localhost}:8000
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: http://${HOST_IP:-localhost}:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_URL: http://${HOST_IP:-localhost}:8000
    ports:
      - "3001:3001"
    environment:
      NEXTAUTH_URL: http://${HOST_IP:-localhost}:3001
      NEXTAUTH_SECRET: dev-secret-change-in-production
    depends_on:
      - backend

volumes:
  pgdata:
