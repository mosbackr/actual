services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: acutal
      POSTGRES_PASSWORD: acutal
      POSTGRES_DB: acutal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acutal"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ACUTAL_DATABASE_URL: postgresql+asyncpg://acutal:acutal2024secure@db:5432/acutal
      ACUTAL_JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ACUTAL_LOGO_DEV_TOKEN: ${ACUTAL_LOGO_DEV_TOKEN:-}
      ACUTAL_PERPLEXITY_API_KEY: ${ACUTAL_PERPLEXITY_API_KEY:-}
      ACUTAL_ANTHROPIC_API_KEY: ${ACUTAL_ANTHROPIC_API_KEY:-}
      ACUTAL_AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      ACUTAL_AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      ACUTAL_S3_BUCKET_NAME: ${S3_BUCKET_NAME:-deepthesis-pitch-documents}
      ACUTAL_DATABASE_READONLY_URL: ${ACUTAL_DATABASE_READONLY_URL:-}
      ACUTAL_STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      ACUTAL_STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      ACUTAL_STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      ACUTAL_STRIPE_PRICE_PROFESSIONAL: ${STRIPE_PRICE_PROFESSIONAL:-}
      ACUTAL_STRIPE_PRICE_UNLIMITED: ${STRIPE_PRICE_UNLIMITED:-}
      ACUTAL_RESEND_API_KEY: ${RESEND_API_KEY:-}
      ACUTAL_EMAIL_FROM: ${EMAIL_FROM:-gaius@deepthesis.org}
      ACUTAL_FRONTEND_URL: ${FRONTEND_URL:-https://www.deepthesis.org}
      ACUTAL_DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: https://www.deepthesis.org
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_URL: ""
    ports:
      - "3001:3001"
    environment:
      NEXTAUTH_URL: https://admin.deepthesis.org
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
