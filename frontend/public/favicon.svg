<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#B8553A"/>
  <!-- Layered thesis pages suggesting depth -->
  <rect x="10" y="5" width="14" height="18" rx="1.5" fill="#FAFAF8" opacity="0.3" transform="rotate(6 17 14)"/>
  <rect x="9" y="6" width="14" height="18" rx="1.5" fill="#FAFAF8" opacity="0.5" transform="rotate(2 16 15)"/>
  <rect x="8" y="7" width="14" height="18" rx="1.5" fill="#FAFAF8"/>
  <!-- Analysis lines on front page -->
  <line x1="11" y1="12" x2="19" y2="12" stroke="#B8553A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="11" y1="15" x2="17" y2="15" stroke="#B8553A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="11" y1="18" x2="15" y2="18" stroke="#B8553A" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Uptrend chart accent -->
  <polyline points="11,22 14,20 16.5,21 19,18" fill="none" stroke="#B8553A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
