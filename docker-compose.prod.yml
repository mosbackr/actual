services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: acutal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: acutal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acutal"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ACUTAL_DATABASE_URL: postgresql+asyncpg://acutal:${DB_PASSWORD}@db:5432/acutal
      ACUTAL_JWT_SECRET: ${JWT_SECRET}
      ACUTAL_CORS_ORIGINS: '["https://deepthesis.co","https://www.deepthesis.co","https://admin.deepthesis.co","https://deepthesis.org","https://www.deepthesis.org","https://admin.deepthesis.org","http://localhost:3000","http://localhost:3001"]'
      ACUTAL_PERPLEXITY_API_KEY: ${ACUTAL_PERPLEXITY_API_KEY:-}
      ACUTAL_ANTHROPIC_API_KEY: ${ACUTAL_ANTHROPIC_API_KEY:-}
      ACUTAL_DATABASE_READONLY_URL: ${ACUTAL_DATABASE_READONLY_URL:-}
      ACUTAL_LOGO_DEV_TOKEN: ${ACUTAL_LOGO_DEV_TOKEN:-}
      ACUTAL_AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      ACUTAL_AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      ACUTAL_S3_BUCKET_NAME: ${S3_BUCKET_NAME:-deepthesis-pitch-documents}
      ACUTAL_STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      ACUTAL_STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      ACUTAL_STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      ACUTAL_STRIPE_PRICE_PROFESSIONAL: ${STRIPE_PRICE_PROFESSIONAL:-}
      ACUTAL_STRIPE_PRICE_UNLIMITED: ${STRIPE_PRICE_UNLIMITED:-}
      ACUTAL_FRONTEND_URL: ${FRONTEND_URL:-https://www.deepthesis.co}
      ACUTAL_RESEND_API_KEY: ${RESEND_API_KEY:-}
      ACUTAL_EMAIL_FROM: ${EMAIL_FROM:-gaius@deepthesis.co}
      ACUTAL_DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      ACUTAL_HUNTER_API_KEY: ${HUNTER_API_KEY:-}
      ACUTAL_NEVERBOUNCE_API_KEY: ${NEVERBOUNCE_API_KEY:-}
      ACUTAL_ZOOM_CLIENT_ID: ${ACUTAL_ZOOM_CLIENT_ID:-}
      ACUTAL_ZOOM_CLIENT_SECRET: ${ACUTAL_ZOOM_CLIENT_SECRET:-}
      ACUTAL_ZOOM_WEBHOOK_SECRET: ${ACUTAL_ZOOM_WEBHOOK_SECRET:-}
      ACUTAL_SCRAPIN_API_KEY: ${SCRAPIN_API_KEY:-}
      ACUTAL_SERP_API_KEY: ${SERP_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_ZOOM_CLIENT_ID: ${NEXT_PUBLIC_ZOOM_CLIENT_ID:-}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXTAUTH_URL: https://www.deepthesis.co
      NEXTAUTH_SECRET: ${JWT_SECRET}
      NEXTAUTH_BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_URL: ""
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXTAUTH_URL: https://admin.deepthesis.co
      NEXTAUTH_SECRET: ${JWT_SECRET}
      NEXTAUTH_BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  analysis_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    environment:
      - ACUTAL_DATABASE_URL=postgresql+asyncpg://acutal:${DB_PASSWORD}@db:5432/acutal
      - ACUTAL_PERPLEXITY_API_KEY=${ACUTAL_PERPLEXITY_API_KEY}
      - ACUTAL_ANTHROPIC_API_KEY=${ACUTAL_ANTHROPIC_API_KEY}
      - ACUTAL_AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - ACUTAL_AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ACUTAL_S3_BUCKET_NAME=${S3_BUCKET_NAME:-deepthesis-pitch-documents}
      - ACUTAL_RESEND_API_KEY=${RESEND_API_KEY:-}
      - ACUTAL_EMAIL_FROM=${EMAIL_FROM:-gaius@deepthesis.co}
      - ACUTAL_FRONTEND_URL=${FRONTEND_URL:-https://www.deepthesis.co}
      - ACUTAL_DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - ACUTAL_HUNTER_API_KEY=${HUNTER_API_KEY:-}
      - ACUTAL_NEVERBOUNCE_API_KEY=${NEVERBOUNCE_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
