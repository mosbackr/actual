services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: acutal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: acutal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acutal"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ACUTAL_DATABASE_URL: postgresql+asyncpg://acutal:${DB_PASSWORD}@db:5432/acutal
      ACUTAL_JWT_SECRET: ${JWT_SECRET}
      ACUTAL_CORS_ORIGINS: '["https://deepthesis.org","https://www.deepthesis.org","https://admin.deepthesis.org","http://localhost:3000","http://localhost:3001"]'
      ACUTAL_PERPLEXITY_API_KEY: ${ACUTAL_PERPLEXITY_API_KEY:-}
      ACUTAL_LOGO_DEV_TOKEN: ${ACUTAL_LOGO_DEV_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://deepthesis.org
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://deepthesis.org
      NEXTAUTH_URL: https://deepthesis.org
      NEXTAUTH_SECRET: ${JWT_SECRET}
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_URL: https://deepthesis.org
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: https://deepthesis.org
      NEXTAUTH_URL: https://admin.deepthesis.org
      NEXTAUTH_SECRET: ${JWT_SECRET}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
